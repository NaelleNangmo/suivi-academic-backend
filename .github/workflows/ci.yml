name: Laravel CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:

      # 1. Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installation PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, bcmath

      # 3. Installation dépendances
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # 4. Audit sécurité dépendances
      - name: Security audit (Composer)
        run: composer audit

      # 5. Préparation environnement Laravel
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # 6. Scan secrets
      - name: Scan for secrets
        uses: zricethezav/gitleaks-action@v2

      # 7. Cache optimisation Laravel
      - name: Build application
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      # 8. Base de données de test
      - name: Run migrations
        run: |
          touch database/database.sqlite
          php artisan migrate --force

      # 9. Tests
      - name: Run tests
        run: php artisan test

      # 10. Analyse statique
      - name: Static code analysis
        run: ./vendor/bin/phpstan analyse app config database --memory-limit=2G

      # 11. Scan qualité + vulnérabilités SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=NaelleNangmo_suivi-academic-backend
            -Dsonar.organization=naellenangmo
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.php.version=8.2
            -Dsonar.exclusions=vendor/**,storage/**,bootstrap/cache/**

      # 12. Build Docker image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/suivi-academic-backend:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/suivi-academic-backend:latest

      # 13. Artifact (backup optionnel)
      - name: Create build artifact
        run: |
          zip -r laravel-build.zip . \
          -x "vendor/**" ".git/**" "node_modules/**" ".env"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-build
          path: laravel-build.zip

  # Job CD — déploiement continu vers o2switch via SSH
  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      # Récupère l'IP publique du runner
      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      # Liste les fonctions SSH disponibles sur l'API cPanel o2switch
      - name: List available SSH API functions
        run: |
          RESPONSE=$(curl -s "https://${{ secrets.CPANEL_HOST }}:2083/execute/SSH" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}")
          echo "Runner IP: ${{ steps.runner_ip.outputs.ip }}"
          echo "API Response: $RESPONSE"

      # Déploiement SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          port: ${{ secrets.O2SWITCH_PORT }}
          script: |
            set -e
            cd ${{ secrets.O2SWITCH_PATH }}
            echo "Fetching latest code..."
            git pull origin main
            echo "Installing production dependencies..."
            composer install --no-interaction --no-dev --optimize-autoloader
            echo "Caching Laravel configuration..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "Running database migrations..."
            php artisan migrate --force
            echo "Clearing application cache..."
            php artisan cache:clear
            php artisan queue:restart
            echo "Deployment complete."

      # Nettoyage — suppression de l'IP après déploiement
      - name: Remove runner IP from whitelist
        if: always()
        run: |
          RESPONSE=$(curl -s "https://${{ secrets.CPANEL_HOST }}:2083/execute/SSH/remove_authorized_ip" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            -d "ip=${{ steps.runner_ip.outputs.ip }}")
          echo "API Response: $RESPONSE"
